[build]
command = "npm run build"
functions = ".netlify/functions"
publish = ".next"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# ISR - allow on-demand revalidation
[[headers]]
for = "/_next/static/*"
[headers.values]
cache-control = "public, max-age=31536000, immutable"

[[headers]]
for = "/bookings/:id"
[headers.values]
cache-control = "private, no-cache, no-store, must-revalidate"

# Security headers — self-contained, cannot affect Stripe/payments.
# Verify after deploy: devtools → Network → click the document request →
# Response Headers should list these. If not present, this block didn't apply.
[[headers]]
for = "/*"
[headers.values]
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
# Content-Security-Policy. Allowlists exactly the external origins this app
# uses: Stripe (payment Elements iframe + API) and Supabase (DB/auth/storage).
# 'unsafe-inline' on script-src is required for Next.js hydration and the
# JSON-LD block in layout.tsx; 'unsafe-inline' on style-src for Tailwind's
# injected styles. frame-ancestors 'none' duplicates X-Frame-Options for
# browsers that prefer CSP. If anything renders blank after deploy, check the
# browser console for a CSP violation and add the blocked origin here (or
# temporarily rename this key to Content-Security-Policy-Report-Only).
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
